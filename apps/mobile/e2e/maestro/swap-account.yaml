appId: com.monyvi.app

---

# T035: Edit transaction — swap account
# Precondition: At least two accounts + one transaction exist

# Step 1: Launch app and navigate to Transactions
- runFlow: setup.yaml

# Step 2: Wait for transaction list to load
- waitForAnimationToEnd

# Step 3: Tap on the first transaction card to open edit screen
- tapOn:
    id: "transaction-card-.*"
    index: 0

- waitForAnimationToEnd

# Step 4: Verify edit screen opens
- assertVisible: "Edit Transaction"

# Step 5: Tap the account selector to change account
- tapOn: "Account"

- waitForAnimationToEnd

# Step 6: Select a different account from the list (second option)
- tapOn:
    index: 1
    text: ".*"

# Step 7: Tap Save
- tapOn:
    id: "header-save"

- waitForAnimationToEnd

# Step 8: Verify navigation back to transactions list
- assertVisible: "Transactions"
