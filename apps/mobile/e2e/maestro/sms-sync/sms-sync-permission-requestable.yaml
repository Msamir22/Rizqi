appId: com.monyvi.app
---
# SMS sync asks for read-SMS access with Monyvi UI before the OS prompt.
# Preconditions: app state already contains an authenticated/onboarded user.

- setPermissions:
    permissions:
      sms: unset

- runFlow: ../helpers/open-settings.yaml

- scrollUntilVisible:
    element: "Sync New SMS"
    direction: DOWN
    centerElement: true

- tapOn: "Sync New SMS"

- assertVisible: "Allow SMS sync?"
- assertVisible:
    "Monyvi needs SMS access to scan your messages for past transactions."
- assertVisible: "Allow SMS access"
- assertVisible: "Not now"

- tapOn: "Not now"

- assertNotVisible: "Allow SMS sync?"
