appId: com.monyvi.app

---

# Seed: Create a default "Cash" account if none exists
# This flow checks the dashboard for accounts and creates one if missing.

# Step 1: Launch app
- launchApp:
    appId: com.monyvi.app
    clearState: false

- waitForAnimationToEnd

# Step 2: Check if accounts section on dashboard is empty
# If an account card is visible, skip creation
- runFlow:
    when:
      notVisible: "EGP"
    file: create-default-account.yaml
