appId: com.monyvi.app
---
# Verifies Journey 14 after the runner confirms the background real-SMS
# notification.

- runFlow: ../helpers/open-transactions.yaml

- tapOn:
    id: "filter-period"
- tapOn: "All Time"
- waitForAnimationToEnd

- tapOn:
    id: "search-input"
- inputText: "BACKGROUND CONFIRM MARKET"

- extendedWaitUntil:
    visible: "-71.45 EGP"
    timeout: 30000
