appId: com.monyvi.app
---
# Live detection auto-disables when notification permission is revoked outside
# the app, then the user returns to Settings.
# Preconditions: app state already contains an authenticated/onboarded user.

- setPermissions:
    permissions:
      sms: allow
      notifications: allow

- runFlow: ensure-live-sms-enabled.yaml

- setPermissions:
    permissions:
      notifications: deny

- runFlow: ../helpers/open-settings.yaml

- scrollUntilVisible:
    element:
      id: "live-sms-detection-switch"
    direction: UP
    centerElement: true

- assertVisible:
    id: "live-sms-detection-switch"
    checked: false
