appId: com.monyvi.app
---
# Helper: turn Auto Confirm off when the row is visible.
# Preconditions: Settings is open and the live SMS section is visible.

- runFlow:
    when:
      visible:
        id: "live-sms-auto-confirm-switch"
        checked: true
    commands:
      - tapOn:
          id: "live-sms-auto-confirm-switch"
      - extendedWaitUntil:
          visible:
            id: "live-sms-auto-confirm-switch"
            checked: false
          timeout: 30000
