appId: com.monyvi.app
---
# Journey 11: Sending the same SMS burst should only produce one live detection
# entry.

- runFlow: ensure-live-sms-enabled.yaml
- runFlow: open-sms-simulator.yaml

- tapOn:
    id: "sms-simulator-reset-top"
- tapOn:
    id: "sms-simulator-burst-top"

- extendedWaitUntil:
    visible: "Live detection log count: 1"
    timeout: 60000

- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Live detection log count: 1"
- assertNotVisible: "Live detection log count: 2"
