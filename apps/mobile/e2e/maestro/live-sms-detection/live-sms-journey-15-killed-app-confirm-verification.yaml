appId: com.monyvi.app
env:
  CLOSED_CONFIRM_MARKET: ${MAESTRO_CLOSED_CONFIRM_MARKET || "CLOSED CONFIRM MARKET"}
---
# Verifies Journey 15 after the runner confirms the killed-app real-SMS
# notification.

- runFlow: ../helpers/open-transactions.yaml

- tapOn:
    id: "filter-period"
- tapOn: "All Time"
- waitForAnimationToEnd

- tapOn:
    id: "search-input"
- inputText: ${CLOSED_CONFIRM_MARKET}

- extendedWaitUntil:
    visible: "-72.56 EGP"
    timeout: 30000
