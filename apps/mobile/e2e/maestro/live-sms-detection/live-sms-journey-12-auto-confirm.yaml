appId: com.monyvi.app
---
# Journey 12: With auto-confirm enabled, a detected SMS is processed and the
# user still gets an informational notification.

- runFlow: ensure-live-sms-enabled.yaml

- runFlow:
    when:
      visible:
        id: "live-sms-auto-confirm-switch"
        checked: false
    commands:
      - tapOn:
          id: "live-sms-auto-confirm-switch"
      - extendedWaitUntil:
          visible:
            id: "live-sms-auto-confirm-switch"
            checked: true
          timeout: 30000

- runFlow: open-sms-simulator.yaml
- tapOn:
    id: "sms-simulator-reset-top"

- scrollUntilVisible:
    element:
      id: "sms-simulator-inject-card_last4_match"
    direction: DOWN
    timeout: 30000

- tapOn:
    id: "sms-simulator-inject-card_last4_match"

- scrollUntilVisible:
    element:
      id: "sms-simulator-latest-summary"
    direction: UP
    timeout: 30000

- extendedWaitUntil:
    visible: "Latest detected: 75 EGP from NBE"
    timeout: 60000

# Pull down the notification shade to verify the auto-confirm notification.
- swipe:
    start: 50%, 0%
    end: 50%, 90%
    duration: 500

- extendedWaitUntil:
    visible: "Transaction created"
    timeout: 30000
