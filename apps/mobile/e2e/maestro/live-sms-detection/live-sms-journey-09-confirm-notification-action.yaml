appId: com.monyvi.app
---
# Journey 09: Ask-me mode shows a detected transaction notification.
# The runner taps the Android notification action and verifies the saved
# transaction after this setup flow completes.

- runFlow: ensure-live-sms-enabled.yaml
- runFlow: ensure-live-sms-auto-confirm-disabled.yaml
- runFlow: open-sms-simulator.yaml

- tapOn:
    id: "sms-simulator-reset-top"
- tapOn:
    id: "sms-simulator-inject-confirm-probe-top"

- extendedWaitUntil:
    visible: "Live detection log count: 1"
    timeout: 60000
