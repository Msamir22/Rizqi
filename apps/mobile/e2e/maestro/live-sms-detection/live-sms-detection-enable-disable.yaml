appId: com.monyvi.app
---
# Live detection can be enabled when SMS and notification permissions are granted,
# then disabled by the user without leaving stale auto-confirm state.
# Preconditions: app state already contains an authenticated/onboarded user.

- setPermissions:
    permissions:
      sms: allow
      notifications: allow

- runFlow: ensure-live-sms-disabled.yaml

- runFlow: ../helpers/open-settings.yaml

- scrollUntilVisible:
    element:
      id: "live-sms-detection-switch"
    direction: DOWN
    centerElement: true

- tapOn:
    id: "live-sms-detection-switch"

- assertVisible:
    id: "live-sms-detection-switch"
    checked: true

- tapOn:
    id: "live-sms-detection-switch"

- assertVisible:
    id: "live-sms-detection-switch"
    checked: false
