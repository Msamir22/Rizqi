appId: com.monyvi.app

---

# T032: Edit an existing transaction
# Precondition: At least one transaction exists

# Step 1: Launch app and navigate to Transactions
- runFlow: setup.yaml

# Step 2: Wait for transaction list to load
- waitForAnimationToEnd

# Step 3: Tap on the first transaction card
- tapOn:
    id: "transaction-card-.*"
    index: 0

- waitForAnimationToEnd

# Step 4: Verify edit screen opens
- assertVisible: "Edit Transaction"

# Step 5: Tap on amount area to modify — clear and retype
# The amount field should be visible; tap a keypad number to change it
- tapOn: "7"
- tapOn: "7"
- tapOn: "7"

# Step 6: Tap Save
- tapOn:
    id: "header-save"

- waitForAnimationToEnd

# Step 7: Verify we're back on the transactions list
- assertVisible: "Transactions"
