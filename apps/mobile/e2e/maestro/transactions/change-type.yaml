appId: com.monyvi.app
---
# T036: Edit transaction — change type from Expense to Income
# Precondition: At least one expense transaction exists

# Step 1: Launch app and navigate to Transactions
- runFlow: ../helpers/setup.yaml

# Step 2: Wait for transaction list to load
- waitForAnimationToEnd

# Step 3: Search for the seeded expense transaction.
- tapOn:
    id: "search-input"

- inputText: "E2E Grocery"
- pressKey: Back
- extendedWaitUntil:
    visible: "E2E Grocery"
    timeout: 30000

# Step 4: Tap on the seeded expense transaction card to open edit screen
- tapOn:
    id: "transaction-card-.*"
    index: 0

- waitForAnimationToEnd

# Step 5: Verify edit screen opens
- assertVisible: "Edit Transaction"

# Step 6: Tap INCOME type tab to change transaction type
- tapOn:
    id: "type-tab-INCOME"

- waitForAnimationToEnd

# Step 7: Tap Save
- tapOn:
    id: "header-save"

- waitForAnimationToEnd

# Step 8: Verify navigation back to transactions list
- extendedWaitUntil:
    visible:
      id: "filter-period"
    timeout: 30000
