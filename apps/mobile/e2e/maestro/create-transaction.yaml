appId: com.monyvi.app

---

# T031: Create a new expense transaction
# Precondition: At least one account exists in the app

# Step 1: Launch app and navigate to Transactions
- runFlow: setup.yaml

# Step 2: Tap the FAB to open quick actions
- tapOn:
    id: "fab-button"

- waitForAnimationToEnd

# Step 3: Tap "Add Transaction" action
- tapOn:
    id: "fab-transaction"

- waitForAnimationToEnd

# Step 4: Verify we're on the New Transaction screen
- assertVisible: "New Transaction"

# Step 5: EXPENSE tab should be selected by default
- assertVisible: "EXPENSE"

# Step 6: Enter amount using calculator keypad
- tapOn: "1"
- tapOn: "5"
- tapOn: "0"

# Step 7: Select first category (tap first available chip)
- tapOn:
    id: "type-tab-EXPENSE"
# Categories should be visible as chips below the amount

# Step 8: Tap Save
- tapOn:
    id: "header-save"

- waitForAnimationToEnd

# Step 9: Verify navigation back or success indicator
# After save, the app navigates back — we should be on some screen
# A toast "Transaction created" should appear
- assertVisible: "Transactions"
