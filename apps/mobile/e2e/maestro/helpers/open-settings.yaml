appId: com.monyvi.app
---
# Helper: open the Settings screen from a loaded app shell.
# Preconditions: app state already contains an authenticated/onboarded user.

- extendedWaitUntil:
    visible: "LANGUAGE|SMS SYNC|LIVE SMS DETECTION|Open menu"
    timeout: 120000

- runFlow:
    when:
      visible: "Open menu"
    commands:
      - tapOn: "Settings"
      - extendedWaitUntil:
          visible: "LANGUAGE|SMS SYNC|LIVE SMS DETECTION"
          timeout: 120000

- extendedWaitUntil:
    visible: "LANGUAGE|SMS SYNC|LIVE SMS DETECTION"
    timeout: 120000

- assertVisible: "LANGUAGE|SMS SYNC|LIVE SMS DETECTION"
