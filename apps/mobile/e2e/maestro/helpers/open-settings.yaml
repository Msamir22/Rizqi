appId: com.monyvi.app
---
# Helper: open the Settings screen from a loaded app shell.
# Preconditions: app state already contains an authenticated/onboarded user.

- runFlow:
    when:
      notVisible:
        id: "sms-sync-button"
    commands:
      - openLink:
          link: monyvi://settings
      - extendedWaitUntil:
          visible:
            id: "sms-sync-button"
          timeout: 120000

- extendedWaitUntil:
    visible:
      id: "sms-sync-button"
    timeout: 120000

- assertVisible:
    id: "sms-sync-button"
