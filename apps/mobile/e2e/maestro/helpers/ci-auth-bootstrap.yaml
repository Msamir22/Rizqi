appId: com.monyvi.app
---
# CI helper: sign in with the configured E2E test account, then finish
# onboarding if this is the account's first local launch.

- waitForAnimationToEnd

- runFlow:
    when:
      visible: "This is the developer menu"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Connected to:"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - extendedWaitUntil:
          visible: "Welcome to Monyvi|Email address|Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
          timeout: 120000

- runFlow:
    when:
      visible: "Welcome to Monyvi"
    commands:
      - tapOn: "Email address"
      - inputText: ${MAESTRO_E2E_EMAIL}
      - tapOn: "Password"
      - inputText: ${MAESTRO_E2E_PASSWORD}
      - tapOn: "Sign in"
      - runFlow:
          when:
            visible: "Save password to Google?"
          commands:
            - tapOn: "Not now|Never"
      - runFlow:
          when:
            visible: "Auto-Track Transactions"
          commands:
            - tapOn: "Not Now"
      - extendedWaitUntil:
          visible: "Choose your primary currency|Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
          timeout: 120000

- runFlow:
    when:
      visible: "Choose your primary currency"
    commands:
      - tapOn: "Confirm"
      - extendedWaitUntil:
          visible: "Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
          timeout: 120000

- runFlow:
    when:
      visible: "Auto-Track Transactions"
    commands:
      - tapOn: "Not Now"
      - extendedWaitUntil:
          visible: "Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
          timeout: 120000

- extendedWaitUntil:
    visible: "Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
    timeout: 120000
