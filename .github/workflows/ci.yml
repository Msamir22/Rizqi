name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Mobile
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Typecheck Logic
        run: npm run typecheck -w @astik/logic

      - name: Lint
        run: npm run lint

      - name: Test Logic Package
        run: npm test -w @astik/logic

      - name: Test Mobile App
        run: npm test -w @astik/mobile

  android-build:
    name: Android Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Expo Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: astik-android-release
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 7
