name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Skip downloading the Sentry CLI binary — not needed for lint/typecheck/tests.
      # Without this, @sentry/cli's postinstall fetches a ~50MB binary from GitHub
      # Releases with no timeout, which silently hangs on flaky runners.
      SENTRYCLI_SKIP_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30

      - name: Typecheck
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: i18n Coverage Check
        working-directory: apps/mobile
        run: npm run i18n:check

      - name: Test Logic Package
        run: npm test -w @monyvi/logic

      - name: Test Mobile App
        run: npm test -w @monyvi/mobile

  android-build:
    name: Android Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality
    env:
      SENTRYCLI_SKIP_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Prebuild Expo Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Build Debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: monyvi-android-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: android-build
    env:
      CI: "true"
      SENTRYCLI_SKIP_DOWNLOAD: "1"
      EXPO_PUBLIC_SENTRY_DSN: ""
      E2E_SUPABASE_MODE: local
      EXPO_PUBLIC_MONYVI_TEST_MODE: e2e
      EXPO_PUBLIC_AI_SMS_PARSER_MODE: fixture
      ANDROID_SERIAL: emulator-5554
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30

      - name: Start local Supabase
        run: npx supabase start
        timeout-minutes: 10

      - name: Prepare local E2E environment
        run: |
          npx supabase status -o env | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY)=' > supabase.env
          . ./supabase.env
          MAESTRO_E2E_EMAIL="e2e-${GITHUB_RUN_ID}@monyvi.test"
          MAESTRO_E2E_PASSWORD="$(node -e "console.log(require('node:crypto').randomBytes(24).toString('base64url'))")"
          EXPO_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export MAESTRO_E2E_EMAIL MAESTRO_E2E_PASSWORD EXPO_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getE2eSeedConfig } = require("./apps/mobile/scripts/e2e-seed");
          const config = getE2eSeedConfig({
            E2E_SUPABASE_MODE: "local",
            EXPO_PUBLIC_SUPABASE_ANON_KEY: process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY,
            SUPABASE_SERVICE_ROLE_KEY: process.env.SUPABASE_SERVICE_ROLE_KEY,
            MAESTRO_E2E_EMAIL: process.env.MAESTRO_E2E_EMAIL,
            MAESTRO_E2E_PASSWORD: process.env.MAESTRO_E2E_PASSWORD,
          });
          console.log(`EXPO_PUBLIC_SUPABASE_URL=${config.appSupabaseUrl}`);
          console.log(`EXPO_PUBLIC_SUPABASE_ANON_KEY=${config.anonKey}`);
          console.log(`SUPABASE_SERVICE_ROLE_KEY=${config.serviceRoleKey}`);
          console.log(`MAESTRO_E2E_EMAIL=${config.email}`);
          console.log(`MAESTRO_E2E_PASSWORD=${config.password}`);
          NODE

      - name: Download Android debug APK
        uses: actions/download-artifact@v4
        with:
          name: monyvi-android-debug
          path: monyvi-android-debug

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Metro
        working-directory: apps/mobile
        run: |
          npx expo start --clear --dev-client --port 8081 > ../../metro.log 2>&1 &
          echo $! > ../../metro.pid

      - name: Run Maestro E2E on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: bash apps/mobile/scripts/run-android-e2e-ci.sh

      - name: Stop Metro
        if: always()
        run: |
          if [ -f metro.pid ]; then
            kill "$(cat metro.pid)" || true
          fi

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-logs
          path: |
            metro.log
            android-e2e-logcat.log
            ~/.maestro/tests
          retention-days: 7
