name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Skip downloading the Sentry CLI binary — not needed for lint/typecheck/tests.
      # Without this, @sentry/cli's postinstall fetches a ~50MB binary from GitHub
      # Releases with no timeout, which silently hangs on flaky runners.
      SENTRYCLI_SKIP_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30

      - name: Typecheck
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: i18n Coverage Check
        working-directory: apps/mobile
        run: npm run i18n:check

      - name: Test Logic Package
        run: npm test -w @rizqi/logic

      - name: Test Mobile App
        run: npm test -w @rizqi/mobile

  android-build:
    name: Android Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality
    env:
      SENTRYCLI_SKIP_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Prebuild Expo Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Build Debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rizqi-android-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
