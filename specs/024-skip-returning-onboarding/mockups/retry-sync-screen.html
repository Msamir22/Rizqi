<!--
  Approved reference HTML for the Retry Sync Screen — Variant 2 "Status Card".
  Generated via Stitch MCP and approved by the user on 2026-04-18.
  Saved at: specs/024-skip-returning-onboarding/mockups/retry-sync-screen.html

  IMPLEMENTATION NOTES (flagged during approval):
  - The Stitch output includes a top-app-bar with a close (X) button and a
    "Sync Status" title. This SHOULD NOT be present in the React Native
    implementation because:
      * The retry screen is shown BEFORE the user reaches any app surface
        that has a navigable destination to close to.
      * There is no valid "close" action — the only legitimate escape
        hatches are Retry and Sign out (per FR-006).
    → Omit the top-app-bar entirely in the RN component. The "Sign out" ghost
      button and "Retry" primary button within the card are the sole actions.
  - The decorative background glow (primary/5 blur) is optional; use it only
    if it can be achieved cleanly with LinearGradient / shadow without the
    NativeWind v4 crash (`shadow-*` on Pressable etc.).
  - All color hex values in the card body — #F8FAFC, #94A3B8, #64748B, #F87171
    — map to palette slate-25, slate-400, slate-500, red-400 respectively.
    Use the palette constants from `apps/mobile/constants/colors.ts`.
-->

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sync Status</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
  body {
    background-color: #0b1326;
    font-family: 'Inter', sans-serif;
    color: #dae2fd;
    min-height: max(884px, 100dvh);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .iphone-canvas {
    width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background-color: #0b1326;
  }
  .top-app-bar {
    height: 64px;
  }
</style>

<body class="antialiased flex items-center justify-center min-h-screen bg-slate-950">
<div class="iphone-canvas shadow-2xl relative flex flex-col items-center">
  <!-- Status Bar Simulation -->
  <div class="w-full h-11 flex justify-between items-center px-8 z-50">
    <span class="text-white text-[15px] font-semibold">9:41</span>
    <div class="flex gap-1.5 items-center">
      <span class="material-symbols-outlined text-[18px] text-white">signal_cellular_4_bar</span>
      <span class="material-symbols-outlined text-[18px] text-white">wifi</span>
      <span class="material-symbols-outlined text-[22px] text-white">battery_full</span>
    </div>
  </div>

  <!-- OMIT this top-app-bar in the RN implementation — see header comment. -->
  <header class="fixed top-0 w-full z-50 bg-slate-900/60 backdrop-blur-xl flex items-center justify-between px-6 h-16 bg-gradient-to-b from-slate-800/20 to-transparent shadow-none">
    <div class="w-10 h-10 flex items-center justify-center hover:bg-slate-800/50 transition-colors active:scale-95 transition-transform cursor-pointer">
      <span class="material-symbols-outlined text-emerald-400">close</span>
    </div>
    <h1 class="text-emerald-400 font-bold tracking-tight text-lg">Sync Status</h1>
    <div class="w-10"></div>
  </header>

  <main class="flex-1 w-full px-4 pt-40 flex flex-col items-center">
    <!-- Centered Status Card -->
    <div class="w-full max-w-[342px] bg-surface-container-low rounded-2xl p-6 flex flex-col items-center justify-center text-center shadow-[0_8px_24px_-4px_rgba(0,0,0,0.30)]">
      <!-- Icon Tile -->
      <div class="w-12 h-12 bg-error-container/30 rounded-xl flex items-center justify-center mb-5">
        <span class="material-symbols-outlined text-[#F87171] text-2xl">cloud_off</span>
      </div>
      <!-- Status Chip -->
      <div class="inline-flex px-3 py-1 bg-error-container/15 rounded-full mb-4">
        <span class="text-[#F87171] text-xs font-semibold uppercase tracking-wider">Sync failed</span>
      </div>
      <!-- Headline -->
      <h2 class="text-[#F8FAFC] text-[22px] font-bold leading-tight mb-3 max-w-[280px]">
        Couldn't load your account
      </h2>
      <!-- Body -->
      <p class="text-[#94A3B8] text-sm leading-relaxed mb-6 max-w-[280px]">
        We tried to download your latest data but couldn't reach our servers.
      </p>
      <!-- Buttons Side-by-Side -->
      <div class="flex w-full gap-3">
        <button class="w-1/2 h-12 flex items-center justify-center rounded-xl border border-outline-variant/30 text-[#F8FAFC] text-[15px] font-medium hover:bg-surface-variant/50 transition-all active:scale-95">
          Sign out
        </button>
        <button class="w-1/2 h-12 flex items-center justify-center rounded-xl bg-primary-container text-[#002113] text-[15px] font-semibold shadow-lg shadow-emerald-900/20 hover:brightness-110 transition-all active:scale-95">
          Retry
        </button>
      </div>
    </div>

    <!-- Helper line -->
    <p class="mt-6 text-[#64748B] text-xs text-center font-normal px-8">
      Still not working? Check your internet connection.
    </p>
  </main>

  <!-- Home Indicator -->
  <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[134px] h-1.5 bg-white/40 rounded-full"></div>
  <!-- Decorative background glow (optional in RN) -->
  <div class="absolute top-[20%] left-[-20%] w-[150%] h-[400px] bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-10"></div>
</div>
</body>
</html>
